<header>
<p style="padding: 0;margin: 0;">
  <a href="/">
    <b>{{ .Site.Title }}</b>
    <span class="text-stone-500 animate-blink">▮</span>
  </a>
</p>
<ul style="padding: 0;margin: 0;">
  {{ $currentPage := . }}
  {{ range .Site.Menus.main }}
  <li class="{{ if $currentPage.HasMenuCurrent "main" . }}active{{ end }}">
    <a href="{{ .URL }}"><span>{{ .Name }}</span></a>
    {{ end }}
  </li>
</ul>
</header>
<hr class="hr-list" style="padding: 0;margin: 0;">

<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'vi',
    includedLanguages: 'en,ja,ko,zh-CN', // Bạn có thể thêm bớt các ngôn ngữ muốn hỗ trợ ở đây
    layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
    autoDisplay: false
  }, 'google_translate_element');
}
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
    /* Làm đẹp lại widget để tiệp với theme Maverick */
    .goog-te-gadget {
        font-family: inherit !important;
        font-size: 14px !important;
        color: #666 !important;
    }
    .goog-te-gadget-simple {
        background-color: rgba(255, 255, 255, 0.1) !important;
        border: 1px solid #eee !important;
        padding: 5px 10px !important;
        border-radius: 4px !important;
        cursor: pointer !important;
    }
    .goog-te-menu-value span {
        color: #333 !important;
    }
    /* Ẩn thanh biểu ngữ Google Translate xấu xí ở trên đầu trang khi dịch */
    .goog-te-banner-frame.skiptranslate {
        display: none !important;
    }
    body {
        top: 0px !important;
    }
</style>
